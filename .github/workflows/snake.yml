name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist folder
        run: mkdir -p dist

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@main
        id: snake-gif
        with:
          github_user_name: Touka-Agra   # <-- use your exact username
          svg_out_path: dist/github-contribution-grid-snake.svg
          gif_out_path: dist/github-contribution-grid-snake.gif

      - name: Commit & Push
        run: |
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          if [ -f dist/github-contribution-grid-snake.svg ] || [ -f dist/github-contribution-grid-snake.gif ]; then
            git add dist/
            git commit -m "Update GitHub Snake contribution" || echo "No changes to commit"
            git push origin main
          else
            echo "SVG/GIF not generated, skipping commit"
          fi

      - name: Deploy to GitHub Pages (optional)
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
