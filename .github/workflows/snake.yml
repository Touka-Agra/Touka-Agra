name: GitHub Snake

on:
  schedule:
    - cron: '0 0 * * *' # daily update
  workflow_dispatch:

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate GitHub Contribution Snake
        uses: Platane/snk@master
        with:
          github_user_name: ${{ github.actor }}   # your GitHub username automatically
          svg_out_path: github-contribution-grid-snake.svg

      - name: Commit & Push SVG
        run: |
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add github-contribution-grid-snake.svg
          git commit -m "Update GitHub Snake contribution" || echo "No changes to commit"
          git push
